<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Cadastrar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="corpo-login">

    <div class="card-login">
        <h2>Criar Conta</h2>
        
        <input type="text" id="cad-email" placeholder="Escolha um E-mail" required>
        <input type="password" id="cad-senha" placeholder="Crie uma Senha" required>

        <button onclick="realizarCadastro()" class="btn-netflix">Cadastrar</button>

        <div class="rodape-card">
            <p>Já tem conta? <a href="index.html">Entrar agora.</a></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
