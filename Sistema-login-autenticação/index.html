<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Entrar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="corpo-login">

    <div class="card-login">
        <h2>Entrar</h2>
        
        <input type="email" id="campo-email" placeholder="E-mail ou número de telefone" required>
        <input type="password" id="campo-senha" placeholder="Senha" required>

        <button onclick="realizarLogin()" class="btn-netflix">Entrar</button>

        <div class="rodape-card">
            <p>Novo por aqui? <a href="cadastro.html">Cadastre-se agora.</a></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
